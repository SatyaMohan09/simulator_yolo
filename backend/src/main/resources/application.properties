spring.application.name=trajectory-engine
trajectory.algorithm=bspline
trajectory.sampling.interval=0.02
trajectory.waypoint.file-path=../data-generation/sample-data/evtol_trajectory_final.csv
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
bgremoval.python.command=python
bgremoval.service.url=http://127.0.0.1:5001/remove-bg
bgremoval.script.path=../imageprocessing/image/bg-removal-python/bg_service.py

# Relative paths — works on any OS, any machine
trajectory.obstacle.file-path=
trajectory.obstacle.seed-file-path=data/seed_obstacles.csv
trajectory.obstacle.detected-file-path=data/detected_obstacles.csv
trajectory.obstacle.dynamic-file-path=data/dynamic_obstacle2.csv
trajectory.obstacle.ground-truth-file-path=../imageprocessing/data/obstacles.csv
trajectory.obstacle.imageprocessing-file-path=../imageprocessing/data/obstacles.csv

# Match threshold aligned with YOLO validator (was 150, YOLO uses 50 — set to 80 as compromise)
trajectory.obstacle.match-threshold-m=80
